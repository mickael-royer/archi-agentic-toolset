services:
  scoring-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=architoolset
      - DAPR_HTTP_PORT=3500
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - dapr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    dapr:
      app-id: scoring-service
      app-port: 8000
      http-port: 3500
      metrics-port: 9090

  dapr:
    image: daprio/dapr:latest
    command: ./daprd --app-id scoring-service --app-port 8000 --dapr-http-port 3500 --metrics-port 9090
    ports:
      - "3500:3500"
      - "9090:9090"
    volumes:
      - ./components:/components
    network_mode: service:scoring-service

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/architoolset
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j-data:/data
    networks:
      - dapr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Placement service for Dapr (required for state management)
  dapr-placement:
    image: daprio/dapr:latest
    command: ./placement
    ports:
      - "5001:5000"
    networks:
      - dapr-network

volumes:
  neo4j-data:

networks:
  dapr-network:
    driver: bridge
